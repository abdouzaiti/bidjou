<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Les Bijoux d'Oran Manager</title>
    
    <!-- Description -->
    <meta name="description" content="Plateforme premium de gestion pour le club Les Bijoux d'Oran. Suivi des membres, pointage par QR code, et gestion des abonnements." />
    
    <!-- Favicon / Logo in Search Bar & Tabs -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph (Facebook, WhatsApp, Discord, LinkedIn, etc.) -->
    <meta property="og:title" content="Les Bijoux d'Oran Manager" />
    <meta property="og:description" content="Plateforme premium de gestion pour le club Les Bijoux d'Oran. Suivi des membres, pointage QR et abonnements." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Les Bijoux d'Oran Manager" />
    <meta name="twitter:description" content="Plateforme premium de gestion pour le club Les Bijoux d'Oran." />
    <meta name="twitter:image" content="/logo.png" />
  </head>

    <div id="root"></div>

  </body>
